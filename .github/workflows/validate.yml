name: Validate skill

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "17 3 * * 1"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "validate-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: "${{ github.event_name == 'pull_request' }}"

jobs:
  portable:
    name: Portable validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate installable package
        run: python3 skill/scripts/workflow_contract.py validate-package skill
      - name: Check Bash scripts
        run: |
          bash -n skill/scripts/*.sh
          shellcheck --shell=bash skill/scripts/*.sh
      - name: Run portable tests
        run: bash skill/scripts/test_skill.sh --portable

  portable-macos:
    name: Bash 3.2 portable validation
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run with macOS system Bash
        shell: /bin/bash {0}
        run: |
          python_dir=$(dirname "$(command -v python3)")
          export PATH="$python_dir:/usr/bin:/bin:/usr/sbin:/sbin"
          /bin/bash --version
          /bin/bash skill/scripts/test_skill.sh --portable

  integration:
    name: XeLaTeX and Poppler integration
    if: "${{ github.event_name == 'pull_request' }}"
    needs: portable
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install core document toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            fonts-noto-cjk \
            latexmk \
            poppler-utils \
            texlive-xetex
      - name: Require core capabilities
        run: bash skill/scripts/check_environment.sh --require publication
      - name: Run integration tests
        run: bash skill/scripts/test_skill.sh --integration --require-tools

  extended:
    name: Extended document workflows
    if: >-
      ${{ github.event_name == 'schedule' ||
          github.event_name == 'release' ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          github.event_name == 'workflow_dispatch' }}
    needs: portable
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install extended document toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            biber \
            fontconfig \
            fonts-noto-cjk \
            latexmk \
            poppler-utils \
            texlive-bibtex-extra \
            texlive-extra-utils \
            texlive-fonts-recommended \
            texlive-lang-chinese \
            texlive-latex-extra \
            texlive-science \
            texlive-xetex \
            xindy
      - name: Require publication capabilities
        run: bash skill/scripts/check_environment.sh --require publication
      - name: Run extended tests
        run: bash skill/scripts/test_skill.sh --extended --require-tools
